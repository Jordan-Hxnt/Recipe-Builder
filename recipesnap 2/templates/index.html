<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#B8451C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>RecipeSnap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,800;1,9..144,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hd: 'Fraunces', serif;
      --bd: 'Outfit', sans-serif;
      --bg: #FBF8F4;
      --surface: #FFFFFF;
      --text: #1F1A13;
      --dim: #8A7D6B;
      --line: #E6DDD0;
      --pop: #B8451C;
      --pop-soft: #FEF0EA;
      --pop-dark: #943717;
      --green: #2D7A4F;
      --green-soft: #E8F5ED;
      --radius: 16px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#161210;--surface:#211D18;--text:#EDE5D8;--dim:#978A78;
      --line:#352F27;--pop:#E0733D;--pop-soft:#2A1E16;--pop-dark:#F09560;
      --green:#5BC27E;--green-soft:#1A2E22;
    }}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{
      font-family:var(--bd);background:var(--bg);color:var(--text);
      min-height:100dvh;display:flex;flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Header ── */
    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 20px;background:var(--surface);
      border-bottom:1px solid var(--line);
      position:sticky;top:0;z-index:10;
    }
    .brand{display:flex;align-items:center;gap:10px;}
    .brand-icon{
      width:40px;height:40px;background:var(--pop);border-radius:11px;
      display:grid;place-items:center;font-size:20px;
    }
    .brand h1{font-family:var(--hd);font-size:20px;font-weight:800;}
    .brand small{font-size:11px;color:var(--dim);display:block;margin-top:-2px;}
    .btn-reset{
      font-family:var(--bd);font-size:12px;font-weight:600;
      padding:7px 14px;border-radius:8px;cursor:pointer;
      border:1px solid var(--line);background:var(--surface);color:var(--dim);
    }

    /* ── Main ── */
    main{flex:1;width:100%;max-width:540px;margin:0 auto;padding:20px 16px;}

    /* ── Upload ── */
    .upload-zone{
      border:2px dashed var(--line);border-radius:20px;
      padding:44px 20px;text-align:center;cursor:pointer;
      background:var(--surface);transition:all .2s;
    }
    .upload-zone.drag{border-color:var(--pop);background:var(--pop-soft);}
    .upload-zone .icon{font-size:44px;margin-bottom:6px;}
    .upload-zone h2{font-family:var(--hd);font-size:17px;margin-bottom:2px;}
    .upload-zone p{font-size:13px;color:var(--dim);}

    .thumbs{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;}
    .thumb{position:relative;animation:up .3s ease both;}
    .thumb img{width:76px;height:76px;object-fit:cover;border-radius:10px;border:2px solid var(--line);display:block;}
    .thumb-x{
      position:absolute;top:-5px;right:-5px;width:20px;height:20px;
      border-radius:50%;border:none;background:var(--pop);color:#fff;
      font-size:10px;cursor:pointer;display:grid;place-items:center;
    }
    .thumb-add{
      width:76px;height:76px;border-radius:10px;border:2px dashed var(--line);
      display:grid;place-items:center;font-size:24px;color:var(--dim);
      cursor:pointer;background:var(--surface);
    }

    /* ── Buttons ── */
    .btn{
      font-family:var(--bd);font-weight:700;border:none;
      border-radius:var(--radius);cursor:pointer;transition:all .15s;
      width:100%;display:block;text-align:center;
    }
    .btn:active{transform:scale(.97);}
    .btn-primary{padding:15px;font-size:15px;color:#fff;background:var(--pop);margin-top:16px;}
    .btn-primary:disabled{opacity:.45;cursor:default;}
    .btn-secondary{
      padding:13px;font-size:14px;color:var(--text);
      background:var(--surface);border:1px solid var(--line);margin-top:16px;
    }

    /* ── Chips ── */
    .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
    .chip{
      font-family:var(--bd);font-size:13px;font-weight:500;
      padding:7px 13px;border-radius:20px;
      border:1px solid var(--line);background:var(--surface);
      color:var(--text);cursor:pointer;transition:all .15s;
      animation:up .25s ease both;
    }
    .chip:hover{border-color:var(--pop);}
    .chip .x{margin-left:5px;opacity:.4;font-size:11px;}

    /* ── Input ── */
    .input{
      font-family:var(--bd);font-size:14px;
      padding:11px 14px;width:100%;border-radius:10px;
      border:1px solid var(--line);background:var(--surface);color:var(--text);
    }
    .input:focus{outline:2px solid var(--pop);outline-offset:-1px;}
    .row{display:flex;gap:8px;margin-bottom:12px;}
    .row .btn{width:auto;flex-shrink:0;padding:11px 18px;margin:0;}

    /* ── Cards ── */
    .card{
      background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--line);overflow:hidden;
      transition:box-shadow .2s,transform .2s;
      animation:up .4s ease both;cursor:pointer;
    }
    .card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08);transform:translateY(-1px);}
    .card-head{padding:20px;}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
    .card .emoji{font-size:28px;}
    .card h3{font-family:var(--hd);font-size:18px;margin:6px 0 3px;}
    .card .desc{color:var(--dim);font-size:13px;line-height:1.45;}
    .card .vibe{
      font-size:11px;font-weight:600;color:var(--green);
      background:var(--green-soft);padding:3px 9px;border-radius:12px;
      display:inline-block;margin-top:6px;
    }
    .tags{display:flex;gap:6px;flex-shrink:0;}
    .tag{
      font-size:10px;font-weight:600;padding:4px 9px;border-radius:14px;
      background:var(--pop-soft);color:var(--pop);white-space:nowrap;
    }

    .card-body{
      padding:0 20px 20px;border-top:1px solid var(--line);
      margin-top:12px;padding-top:14px;
    }
    .card-body[hidden]{display:none;}
    .sec-title{
      font-family:var(--hd);font-size:12px;font-weight:700;
      text-transform:uppercase;letter-spacing:1px;color:var(--pop);
      margin:0 0 8px;
    }
    .uses-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
    .uses-chip{
      font-size:11px;font-weight:500;padding:3px 8px;border-radius:10px;
      background:var(--green-soft);color:var(--green);
    }
    .extra-chip{
      font-size:11px;font-weight:500;padding:3px 8px;border-radius:10px;
      background:var(--pop-soft);color:var(--pop);
    }
    .ing-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;margin-bottom:16px;}
    .ing-grid span{font-size:13px;line-height:1.6;}
    .step{display:flex;gap:12px;margin-bottom:10px;}
    .step-n{
      font-family:var(--hd);font-size:16px;font-weight:800;
      color:var(--pop);flex-shrink:0;width:22px;text-align:center;line-height:22px;
    }
    .step-t{font-size:13px;line-height:1.55;}
    .card-foot{
      text-align:center;padding:9px;font-size:11px;color:var(--dim);
      border-top:1px solid var(--line);background:var(--bg);
    }

    /* ── Loading ── */
    .loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:36px 0;}
    .spin{
      width:22px;height:22px;border:3px solid var(--line);
      border-top-color:var(--pop);border-radius:50%;
      animation:rot .7s linear infinite;
    }
    .loading span{font-family:var(--hd);font-size:15px;}

    .phase-title{font-family:var(--hd);font-size:24px;margin-bottom:10px;}
    .phase-sub{color:var(--dim);font-size:13px;margin:-6px 0 14px;}

    footer{text-align:center;padding:14px;font-size:11px;color:var(--dim);border-top:1px solid var(--line);}

    .gap{display:flex;flex-direction:column;gap:14px;}
    .error{color:#c53;font-size:13px;text-align:center;margin-top:14px;}
    [hidden]{display:none!important;}

    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes rot{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🥘</div>
    <div><h1>RecipeSnap</h1><small>snap ingredients, get recipes</small></div>
  </div>
  <button class="btn-reset" id="resetBtn" hidden>Start over</button>
</header>

<main>
  <!-- Upload -->
  <section id="phaseUpload">
    <div class="upload-zone" id="dropzone">
      <div class="icon">📸</div>
      <h2>Drop ingredient photos here</h2>
      <p>or tap to snap / upload</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple capture="environment" hidden>
    <div class="thumbs" id="thumbs"></div>
    <button class="btn btn-primary" id="scanBtn" hidden>Identify my ingredients</button>
  </section>

  <!-- Scanning -->
  <section id="phaseScanning" hidden>
    <div class="loading"><div class="spin"></div><span>Scanning your photos<span id="d1"></span></span></div>
  </section>

  <!-- Ingredients -->
  <section id="phaseIngredients" hidden>
    <h2 class="phase-title" id="ingCount"></h2>
    <p class="phase-sub">Tap to remove, type to add</p>
    <div class="chips" id="chips"></div>
    <div class="row">
      <input class="input" id="addInput" placeholder="Add an ingredient...">
      <button class="btn btn-primary" id="addBtn">Add</button>
    </div>
    <input class="input" id="dietInput" placeholder="Dietary preferences? (vegetarian, low-carb, halal...)" style="margin-bottom:16px">
    <button class="btn btn-primary" id="genBtn" style="margin:0">What can I make?</button>
  </section>

  <!-- Cooking -->
  <section id="phaseCooking" hidden>
    <div class="loading"><div class="spin"></div><span>Cooking up ideas<span id="d2"></span></span></div>
  </section>

  <!-- Recipes -->
  <section id="phaseRecipes" hidden>
    <h2 class="phase-title">Here's what you can make</h2>
    <div class="gap" id="recipeList"></div>
    <button class="btn btn-secondary" id="backBtn">&#8592; Back to ingredients</button>
  </section>

  <p class="error" id="errMsg" hidden></p>
</main>

<footer>Powered by Gemini &middot; Your ingredients, your kitchen</footer>

<script>
// ── State ──
let files = [];      // File objects
let thumbUrls = [];  // data URLs
let ingredients = [];

const $ = s => document.querySelector(s);
const show = el => el.removeAttribute("hidden");
const hide = el => el.setAttribute("hidden","");

const phases = {
  upload: $("#phaseUpload"), scanning: $("#phaseScanning"),
  ingredients: $("#phaseIngredients"), cooking: $("#phaseCooking"),
  recipes: $("#phaseRecipes"),
};

function setPhase(n) {
  Object.values(phases).forEach(hide);
  show(phases[n]);
  n === "upload" ? hide($("#resetBtn")) : show($("#resetBtn"));
  hide($("#errMsg"));
}

function err(msg) { $("#errMsg").textContent = msg; show($("#errMsg")); }

function dots(el) {
  let c = 0;
  return setInterval(() => { c = (c+1)%4; el.textContent = ".".repeat(c); }, 350);
}

// ── Images ──
function readThumb(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

async function addFiles(list) {
  for (const f of Array.from(list)) {
    files.push(f);
    thumbUrls.push(await readThumb(f));
  }
  renderThumbs();
}

function removeFile(i) { files.splice(i,1); thumbUrls.splice(i,1); renderThumbs(); }

function renderThumbs() {
  const el = $("#thumbs");
  el.innerHTML = "";
  thumbUrls.forEach((src, i) => {
    const d = document.createElement("div");
    d.className = "thumb"; d.style.animationDelay = `${i*60}ms`;
    d.innerHTML = `<img src="${src}" alt=""><button class="thumb-x" data-i="${i}">&times;</button>`;
    el.appendChild(d);
  });
  if (thumbUrls.length) {
    const a = document.createElement("div");
    a.className = "thumb-add"; a.textContent = "+";
    a.onclick = () => $("#fileInput").click();
    el.appendChild(a);
    show($("#scanBtn"));
  } else hide($("#scanBtn"));
}

$("#thumbs").addEventListener("click", e => {
  const b = e.target.closest(".thumb-x");
  if (b) removeFile(+b.dataset.i);
});

// ── Dropzone ──
const dz = $("#dropzone");
dz.onclick = () => $("#fileInput").click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add("drag"); };
dz.ondragleave = e => { e.preventDefault(); dz.classList.remove("drag"); };
dz.ondrop = e => { e.preventDefault(); dz.classList.remove("drag"); addFiles(e.dataTransfer.files); };
$("#fileInput").onchange = e => addFiles(e.target.files);

// ── Scan ──
$("#scanBtn").onclick = async () => {
  if (!files.length) return;
  setPhase("scanning");
  const dt = dots($("#d1"));
  try {
    const fd = new FormData();
    files.forEach(f => fd.append("images", f));
    const res = await fetch("/api/identify", { method: "POST", body: fd });
    const data = await res.json();
    clearInterval(dt);
    if (data.error) throw new Error(data.error);
    ingredients = data.ingredients;
    renderChips();
    setPhase("ingredients");
  } catch(e) {
    clearInterval(dt);
    err(e.message || "Could not scan. Try a clearer photo.");
    setPhase("upload");
  }
};

// ── Ingredients ──
function renderChips() {
  $("#ingCount").textContent = `Found ${ingredients.length} ingredients`;
  const el = $("#chips"); el.innerHTML = "";
  ingredients.forEach((ing, i) => {
    const c = document.createElement("button");
    c.className = "chip"; c.style.animationDelay = `${i*30}ms`;
    c.innerHTML = `${ing}<span class="x">&times;</span>`;
    c.onclick = () => { ingredients = ingredients.filter(x => x !== ing); renderChips(); };
    el.appendChild(c);
  });
}

function addIng(v) {
  const t = v.trim();
  if (t && !ingredients.includes(t)) { ingredients.push(t); renderChips(); }
}

$("#addBtn").onclick = () => { addIng($("#addInput").value); $("#addInput").value = ""; };
$("#addInput").onkeydown = e => { if (e.key === "Enter") { addIng($("#addInput").value); $("#addInput").value = ""; }};

// ── Generate ──
$("#genBtn").onclick = async () => {
  if (!ingredients.length) return;
  setPhase("cooking");
  const dt = dots($("#d2"));
  try {
    const res = await fetch("/api/recipes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ingredients, dietary: $("#dietInput").value }),
    });
    const data = await res.json();
    clearInterval(dt);
    if (data.error) throw new Error(data.error);
    renderRecipes(data.recipes);
    setPhase("recipes");
  } catch(e) {
    clearInterval(dt);
    err(e.message || "Recipe generation failed. Try again.");
    setPhase("ingredients");
  }
};

// ── Recipes ──
function renderRecipes(recipes) {
  const el = $("#recipeList"); el.innerHTML = "";
  recipes.forEach((r, i) => {
    const card = document.createElement("div");
    card.className = "card"; card.style.animationDelay = `${i*100}ms`;

    const usesHtml = (r.uses||[]).map(u => `<span class="uses-chip">${u}</span>`).join("");
    const extraHtml = (r.extra_needed||[]).filter(Boolean).map(u => `<span class="extra-chip">+ ${u}</span>`).join("");
    const ingHtml = (r.ingredients||[]).map(x => `<span>• ${x}</span>`).join("");
    const stepsHtml = (r.steps||[]).map((s,j) => `<div class="step"><span class="step-n">${j+1}</span><p class="step-t">${s}</p></div>`).join("");

    card.innerHTML = `
      <div class="card-head">
        <div class="card-top">
          <div>
            <span class="emoji">${r.emoji||"🍽"}</span>
            <h3>${r.name}</h3>
            <p class="desc">${r.description||""}</p>
            ${r.vibe ? `<span class="vibe">${r.vibe}</span>` : ""}
          </div>
          <div class="tags">
            <span class="tag">${r.time||""}</span>
            <span class="tag">${r.difficulty||""}</span>
          </div>
        </div>
        <div class="card-body" hidden>
          <h4 class="sec-title">Uses your ingredients</h4>
          <div class="uses-list">${usesHtml}${extraHtml}</div>
          <h4 class="sec-title">Full ingredients</h4>
          <div class="ing-grid">${ingHtml}</div>
          <h4 class="sec-title">Steps</h4>
          ${stepsHtml}
        </div>
      </div>
      <div class="card-foot">tap to expand</div>`;

    card.onclick = () => {
      const b = card.querySelector(".card-body");
      const f = card.querySelector(".card-foot");
      b.hidden ? (show(b), f.textContent="tap to collapse") : (hide(b), f.textContent="tap to expand");
    };
    el.appendChild(card);
  });
}

// ── Nav ──
$("#backBtn").onclick = () => { renderChips(); setPhase("ingredients"); };
$("#resetBtn").onclick = () => {
  files=[]; thumbUrls=[]; ingredients=[];
  $("#thumbs").innerHTML=""; hide($("#scanBtn"));
  setPhase("upload");
};

setPhase("upload");
</script>
</body>
</html>
